<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070b18;min-height:100vh;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:18px 16px;}
.wrap{max-width:600px;margin:0 auto;}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.12);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#3b82f6;border:3px solid #1e40af;cursor:pointer;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 18px;margin-bottom:14px;}
.card-title{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:12px;}
.tab-bar{display:flex;gap:5px;margin-bottom:18px;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;border:1px solid rgba(255,255,255,0.07);}
.tab-btn{flex:1;padding:10px 6px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:#64748b;font-weight:600;font-size:14px;border-bottom:2px solid transparent;transition:all .2s;}
.tab-btn.active{background:rgba(59,130,246,0.25);color:#93c5fd;border-bottom-color:#3b82f6;}
.stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.stat-box{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;flex:1;min-width:110px;}
.pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:10px;font-weight:500;background:rgba(255,255,255,0.07);color:#94a3b8;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:right;color:#475569;font-weight:500;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.07);font-size:10px;white-space:nowrap;}
th:first-child{text-align:left;}
td{padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;vertical-align:middle;}
td:first-child{text-align:left;}
.editable{cursor:text;font-family:monospace;font-size:11px;border-bottom:1px dashed rgba(255,255,255,0.2);padding-bottom:1px;display:inline-block;min-width:10px;}
.slider-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 20px;margin-bottom:16px;}
.tick-row{display:flex;justify-content:space-between;margin-top:6px;}
.tick{font-size:9px;color:#374151;cursor:pointer;font-family:monospace;}
.tick.active{color:#3b82f6;font-weight:700;}
.reset-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 12px;color:#64748b;font-size:11px;font-weight:500;cursor:pointer;}
/* SVG chart styles */
.chart-wrap{width:100%;overflow:hidden;}
.bar-bg{fill:rgba(255,255,255,0.05);}
.axis-line{stroke:rgba(255,255,255,0.05);stroke-width:1;}
.axis-label{fill:#475569;font-size:9px;font-family:monospace;}
</style>

// Back-solve opening balance from first year's Interest Earned: interest = opening * ROR
function buildBalances(data){
  const r={};
  for(const sh of CS){
    const sd=data[sh];if(!sd)continue;
    const yrs=Object.keys(sd).map(Number).sort((a,b)=>a-b);
    if(!yrs.length)continue;
    const fd=sd[yrs[0]];
    const ror0=fd["Return %"]||0;
    let bal=ror0!==0?(fd["Interest Earned"]||0)/ror0:0;
    bal=Math.max(0,bal);
    const b={};
    for(const y of yrs){
      const d=sd[y];
      bal=bal+bal*(d["Return %"]||0)+(d["Personal Contributions"]||0)+(d["Comp Match"]||0)+(d["Withdrawals"]||0)+(d["Fees"]||0);
      bal=Math.max(0,bal);b[y]=bal;
    }
    r[sh]=b;
  }
  return r;
}
function getPV(pb,sh,y){
  const d=pb[sh];if(!d)return 0;
  if(d[y]!==undefined)return d[y];
  const ys=Object.keys(d).map(Number).sort((a,b)=>a-b);
  const bef=ys.filter(x=>x<=y);return bef.length?d[bef[bef.length-1]]:0;
}
function getSV(sh,y){
  const d=STATIC[sh]?.data;if(!d)return 0;
  if(d[y]!==undefined)return d[y];
  const ys=Object.keys(d).map(Number).sort((a,b)=>a-b);
  const bef=ys.filter(x=>x<=y);return bef.length?d[bef[bef.length-1]]:0;
}
function getD(sh,y){return cd[sh]?.[y]||cd[sh]?.[String(y)]||null;}

// ── SVG CHARTS (no dependencies) ─────────────────────────────────────────────
function svgStackedBar(datasets,labels,W,H){
  const PL=42,PR=8,PT=8,PB=28;
  const w=W-PL-PR,h=H-PT-PB;
  const n=labels.length;
  const totals=labels.map((_,i)=>datasets.reduce((s,ds)=>s+Math.max(0,ds.data[i]||0),0));
  const maxV=Math.max(...totals,1);
  const barW=Math.max(4,Math.floor(w/n)-2);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
  // grid lines
  for(let i=0;i<=4;i++){
    const yy=PT+h-(h*i/4);
    const v=maxV*i/4;
    svg+=`<line x1="${PL}" y1="${yy}" x2="${PL+w}" y2="${yy}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${yy+3}" text-anchor="end" fill="#475569" font-size="9" font-family="monospace">${fmt(v)}</text>`;
  }
  // bars
  labels.forEach((lbl,i)=>{
    const x=PL+i*(w/n)+(w/n-barW)/2;
    let yOff=0;
    datasets.forEach(ds=>{
      const v=Math.max(0,ds.data[i]||0);
      if(v<=0)return;
      const bh=Math.max(1,(v/maxV)*h);
      const by=PT+h-yOff-bh;
      svg+=`<rect x="${x}" y="${by}" width="${barW}" height="${bh}" fill="${ds.color}" rx="1"/>`;
      yOff+=bh;
    });
    // x label
    if(typeof lbl==="number"?lbl%5===0:true){
      svg+=`<text x="${x+barW/2}" y="${PT+h+16}" text-anchor="middle" fill="#475569" font-size="9" font-family="monospace">${lbl}</text>`;
    }
  });
  svg+=`</svg>`;return svg;
}

function svgDonut(slices,W,H){
  const cx=W/2,cy=H/2,ro=Math.min(W,H)/2-4,ri=ro*0.58;
  const total=slices.reduce((s,x)=>s+x.value,0);
  if(total<=0)return`<svg width="${W}" height="${H}"></svg>`;
  let angle=-Math.PI/2,svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  slices.forEach(sl=>{
    const sweep=(sl.value/total)*2*Math.PI;
    const a1=angle,a2=angle+sweep-0.02;
    const x1=cx+ro*Math.cos(a1),y1=cy+ro*Math.sin(a1);
    const x2=cx+ro*Math.cos(a2),y2=cy+ro*Math.sin(a2);
    const x3=cx+ri*Math.cos(a2),y3=cy+ri*Math.sin(a2);
    const x4=cx+ri*Math.cos(a1),y4=cy+ri*Math.sin(a1);
    const lg=sweep>Math.PI?1:0;
    svg+=`<path d="M${x1},${y1} A${ro},${ro} 0 ${lg},1 ${x2},${y2} L${x3},${y3} A${ri},${ri} 0 ${lg},0 ${x4},${y4} Z" fill="${sl.color}"/>`;
    angle+=sweep;
  });
  svg+=`</svg>`;return svg;
}

function svgGroupedBar(groups,keys,colors,W,H){
  const PL=42,PR=8,PT=8,PB=44;
  const w=W-PL-PR,h=H-PT-PB;
  const n=groups.length,k=keys.length;
  const maxV=Math.max(...groups.flatMap(g=>keys.map(key=>Math.abs(g[key]||0))),1);
  const groupW=w/n,barW=Math.max(3,Math.floor(groupW/k)-1);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
  for(let i=0;i<=4;i++){
    const yy=PT+h*(1-i/4);
    svg+=`<line x1="${PL}" y1="${yy}" x2="${PL+w}" y2="${yy}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${yy+3}" text-anchor="end" fill="#475569" font-size="9" font-family="monospace">${fmt(maxV*i/4)}</text>`;
  }
  groups.forEach((g,gi)=>{
    const gx=PL+gi*groupW;
    keys.forEach((key,ki)=>{
      const v=Math.abs(g[key]||0);
      if(v<=0)return;
      const bh=Math.max(1,(v/maxV)*h);
      const bx=gx+(groupW-k*barW)/2+ki*barW;
      const by=PT+h-bh;
      svg+=`<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${colors[ki]}" rx="1"/>`;
    });
    const lbl=g.name||g.year||"";
    svg+=`<text x="${gx+groupW/2}" y="${PT+h+12}" text-anchor="middle" fill="#475569" font-size="8" font-family="monospace" transform="rotate(-30,${gx+groupW/2},${PT+h+12})">${lbl}</text>`;
  });
  svg+=`</svg>`;return svg;
}

              <span style="font-size:12px;font-family:monospace;color:#cbd5e1;font-weight:600">${fmtF(val)}</span>

            </div>

          <div style="margin-left:11px;background:rgba(255,255,255,0.05);border-radius:2px;height:3px;overflow:hidden">
            <div style="width:${pp}%;height:100%;background:${SC[sh]||cc};border-radius:2px;opacity:.7"></div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("")}
</div>

<div class="card">

    <div style="display:flex;align-items:center;gap:7px"><div style="width:9px;height:9px;border-radius:50%;background:${CAT_COLORS[c]}"></div><span style="font-size:12px;color:#94a3b8">${CAT_LABELS[c]}</span></div>

  </div>`).join("")}
</div>

<div class="card">
  <div class="card-title">Net Worth Over Time</div>
  <div style="overflow-x:auto">${nwChart}</div>
  <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
    ${allSh.map(sh=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:2px;background:${SC[sh]}"></div><span style="font-size:9px;color:#475569">${sh}</span></div>`).join("")}
  </div>
</div>
`:""}

${tab===1?`
<div class="slider-card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:12px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:.5px">Activity Year</span>
    <span style="font-size:28px;font-weight:700;color:#3b82f6;font-family:serif">${y2}</span>

  <input type="range" min="2020" max="2075" value="${y2}" oninput="setY2(+this.value)"/>
  <div class="tick-row">${sliderTicks.map(y=>`<span class="tick${y===y2?" active":""}" onclick="setY2(${y})">${y}</span>`).join("")}</div>
</div>

<div class="stat-row">
  <div class="stat-box" style="border:1px solid #3b82f630"><div style="font-size:10px;color:#64748b;margin-bottom:3px">Personal</div><div style="font-size:15px;font-family:monospace;color:#3b82f6;font-weight:700">${fmt(totP)}</div></div>
  <div class="stat-box" style="border:1px solid #10b98130"><div style="font-size:10px;color:#64748b;margin-bottom:3px">Match</div><div style="font-size:15px;font-family:monospace;color:#10b981;font-weight:700">${fmt(totM)}</div></div>
  <div class="stat-box" style="border:1px solid #f59e0b30"><div style="font-size:10px;color:#64748b;margin-bottom:3px">Interest</div><div style="font-size:15px;font-family:monospace;color:#f59e0b;font-weight:700">${fmt(totI)}</div></div>
  <div class="stat-box" style="border:1px solid #ef444430"><div style="font-size:10px;color:#64748b;margin-bottom:3px">Withdrawals</div><div style="font-size:15px;font-family:monospace;color:#ef4444;font-weight:700">${fmt(totW)}</div></div>
</div>

<div class="card">
  <div class="card-title">Activity by Account — ${y2}</div>
  <div style="overflow-x:auto">${actChart}</div>
  <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">
    ${[["Personal","#3b82f6"],["Match","#10b981"],["Interest","#f59e0b"],["Withdrawals","#ef4444"]].map(([l,c])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:2px;background:${c}"></div><span style="font-size:11px;color:#64748b">${l}</span></div>`).join("")}
  </div>

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="card-title" style="margin:0">Account Detail — ${y2}</div>
    <span style="font-size:10px;color:#475569">tap to edit</span>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th style="text-align:left">Account</th>
        <th>Personal</th><th>Match</th><th>Interest</th><th>ROR</th><th>Withdrawals</th><th>Fees</th>
      </tr></thead>
      <tbody>
        ${CS.map(sh=>{
          const d=bySheetC[sh];if(!d)return"";
          if(!(d["Personal Contributions"]||d["Comp Match"]||d["Interest Earned"]||d["Withdrawals"]||d["Fees"]||d["Return %"]))return"";
          const yk=cd[sh]?.[y2]?y2:String(y2);
          const ec=(val,field,fmtType,color)=>{
            const disp=fmtType==="pct"?`${(val*100).toFixed(2)}%`:val===0?"—":val<0?`(${fmt(Math.abs(val))})`:fmt(val);
            return`<span class="editable" style="color:${color}" contenteditable="true" data-sheet="${sh}" data-yr="${yk}" data-field="${field}" data-fmt="${fmtType}">${disp}</span>`;
          };
          return`<tr>
            <td style="text-align:left"><div style="display:flex;align-items:center;gap:4px"><div style="width:6px;height:6px;border-radius:50%;background:${SC[sh]};flex-shrink:0"></div><span style="font-size:10px;color:#e2e8f0">${sh}</span></div></td>
            <td>${ec(d["Personal Contributions"]||0,"Personal Contributions","dollar","#3b82f6")}</td>
            <td>${ec(d["Comp Match"]||0,"Comp Match","dollar","#10b981")}</td>
            <td>${ec(d["Interest Earned"]||0,"Interest Earned","dollar","#f59e0b")}</td>
            <td>${ec(d["Return %"]||0,"Return %","pct","#a78bfa")}</td>
            <td>${ec(d["Withdrawals"]||0,"Withdrawals","neg","#ef4444")}</td>
            <td>${ec(d["Fees"]||0,"Fees","neg","#f87171")}</td>
          </tr>`;
        }).join("")}
      </tbody>

<div class="card">
  <div class="card-title">Annual Trend by Account</div>

  <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">
    ${[["Personal","#3b82f6"],["Match","#10b981"],["Interest","#f59e0b"],["Withdrawals","#ef4444"]].map(([l,c])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:2px;background:${c}"></div><span style="font-size:11px;color:#64748b">${l}</span></div>`).join("")}
  </div>
</div>
`:""}

<div style="margin-top:14px;text-align:center;font-size:10px;color:#1e293b">Girsch Household · Projections are estimates</div>`;
}

function attachEvents(){
  document.querySelectorAll(".editable").forEach(el=>{
    el.addEventListener("focus",()=>{
      const sh=el.dataset.sheet,yr=el.dataset.yr,field=el.dataset.field,ft=el.dataset.fmt;
      const d=cd[sh]?.[yr]||cd[sh]?.[String(yr)];
      if(!d)return;
      const val=d[field]||0;
      el.textContent=ft==="pct"?(val*100).toFixed(2):String(Math.round(Math.abs(val)));
      setTimeout(()=>{const r=document.createRange(),s=window.getSelection();r.selectNodeContents(el);s.removeAllRanges();s.addRange(r);},10);
    });
    el.addEventListener("blur",()=>{
      const sh=el.dataset.sheet,yr=el.dataset.yr,field=el.dataset.field,ft=el.dataset.fmt;
      const n=parseFloat(el.textContent.replace(/[^0-9.\-]/g,""));
      if(isNaN(n))return render();
      let val=ft==="pct"?n/100:ft==="neg"?-Math.abs(n):n;
      if(!cd[sh])cd[sh]={};
      if(!cd[sh][yr])cd[sh][yr]={};
      cd[sh][yr][field]=val;persist();render();
    });
    el.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();el.blur();}if(e.key==="Escape")render();});
  });
}

window.switchTab=t=>{tab=t;render();};
window.setY1=y=>{y1=y;render();};
window.setY2=y=>{y2=y;render();};
window.setTrend=s=>{trendSheet=s;render();};
window.resetData=()=>{if(confirm("Reset all edits?")){cd=JSON.parse(JSON.stringify(IC));persist();render();}};

render();
</script>
</body>
</html>
