<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070b18;min-height:100vh;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:18px 16px;}
.wrap{max-width:600px;margin:0 auto;}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.12);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#3b82f6;border:3px solid #1e40af;cursor:pointer;}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 18px;margin-bottom:14px;}
.card-title{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:12px;}
.tab-bar{display:flex;gap:5px;margin-bottom:14px;background:rgba(255,255,255,0.04);border-radius:12px;padding:4px;border:1px solid rgba(255,255,255,0.07);}
.tab-btn{flex:1;padding:10px 6px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:#64748b;font-weight:600;font-size:13px;transition:all .2s;}
.tab-btn.active{background:rgba(59,130,246,0.25);color:#93c5fd;border-bottom:2px solid #3b82f6;}
.stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.stat-box{background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;flex:1;min-width:100px;}
.pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:10px;font-weight:500;background:rgba(255,255,255,0.07);color:#94a3b8;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:right;color:#475569;font-weight:500;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.07);font-size:10px;white-space:nowrap;}
th:first-child{text-align:left;}
td{padding:7px 4px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;vertical-align:middle;}
td:first-child{text-align:left;}
.editable{cursor:text;font-family:monospace;font-size:11px;border-bottom:1px dashed rgba(255,255,255,0.2);padding-bottom:1px;display:inline-block;min-width:10px;}
.slider-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 20px;margin-bottom:16px;}
.tick-row{display:flex;justify-content:space-between;margin-top:6px;}
.tick{font-size:9px;color:#374151;cursor:pointer;font-family:monospace;}
.tick.active{color:#3b82f6;font-weight:700;}
.reset-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 12px;color:#64748b;font-size:11px;font-weight:500;cursor:pointer;}
</style>

function svgStackedBar(datasets,labels,W,H){
  const PL=46,PR=8,PT=8,PB=28;
  const w=W-PL-PR,h=H-PT-PB,n=labels.length;
  const totals=labels.map((_,i)=>datasets.reduce((s,ds)=>s+Math.max(0,ds.data[i]||0),0));
  const maxV=Math.max(...totals,1);
  const barW=Math.max(4,Math.floor(w/n)-2);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
  for(let i=0;i<=4;i++){
    const yy=PT+h-(h*i/4);
    svg+=`<line x1="${PL}" y1="${yy}" x2="${PL+w}" y2="${yy}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${yy+3}" text-anchor="end" fill="#475569" font-size="9" font-family="monospace">${fmt(maxV*i/4)}</text>`;
  }
  labels.forEach((lbl,i)=>{
    const x=PL+i*(w/n)+(w/n-barW)/2;
    let yOff=0;
    datasets.forEach(ds=>{
      const v=Math.max(0,ds.data[i]||0);if(v<=0)return;
      const bh=Math.max(1,(v/maxV)*h),by=PT+h-yOff-bh;
      svg+=`<rect x="${x}" y="${by}" width="${barW}" height="${bh}" fill="${ds.color}" rx="1"/>`;
      yOff+=bh;
    });
    if(typeof lbl==="number"?lbl%5===0:true)
      svg+=`<text x="${x+barW/2}" y="${PT+h+16}" text-anchor="middle" fill="#475569" font-size="9" font-family="monospace">${lbl}</text>`;
  });
  return svg+`</svg>`;
}
function svgDonut(slices,W,H){
  const cx=W/2,cy=H/2,ro=Math.min(W,H)/2-4,ri=ro*0.58;
  const total=slices.reduce((s,x)=>s+x.value,0);
  if(total<=0)return`<svg width="${W}" height="${H}"></svg>`;
  let angle=-Math.PI/2,svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  slices.forEach(sl=>{
    const sweep=(sl.value/total)*2*Math.PI,a1=angle,a2=angle+sweep-0.02;
    const x1=cx+ro*Math.cos(a1),y1=cy+ro*Math.sin(a1),x2=cx+ro*Math.cos(a2),y2=cy+ro*Math.sin(a2);
    const x3=cx+ri*Math.cos(a2),y3=cy+ri*Math.sin(a2),x4=cx+ri*Math.cos(a1),y4=cy+ri*Math.sin(a1);
    svg+=`<path d="M${x1},${y1} A${ro},${ro} 0 ${sweep>Math.PI?1:0},1 ${x2},${y2} L${x3},${y3} A${ri},${ri} 0 ${sweep>Math.PI?1:0},0 ${x4},${y4} Z" fill="${sl.color}"/>`;
    angle+=sweep;
  });
  return svg+`</svg>`;
}
function svgGroupedBar(groups,keys,colors,W,H){
  const PL=46,PR=8,PT=8,PB=50,w=W-PL-PR,h=H-PT-PB,n=groups.length,k=keys.length;
  const maxV=Math.max(...groups.flatMap(g=>keys.map(key=>Math.abs(g[key]||0))),1);
  const groupW=w/n,barW=Math.max(3,Math.floor(groupW/k)-1);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible">`;
  for(let i=0;i<=4;i++){
    const yy=PT+h*(1-i/4);
    svg+=`<line x1="${PL}" y1="${yy}" x2="${PL+w}" y2="${yy}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    svg+=`<text x="${PL-4}" y="${yy+3}" text-anchor="end" fill="#475569" font-size="9" font-family="monospace">${fmt(maxV*i/4)}</text>`;
  }
  groups.forEach((g,gi)=>{
    const gx=PL+gi*groupW;
    keys.forEach((key,ki)=>{
      const v=Math.abs(g[key]||0);if(v<=0)return;
      const bh=Math.max(1,(v/maxV)*h),bx=gx+(groupW-k*barW)/2+ki*barW,by=PT+h-bh;
      svg+=`<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${colors[ki]}" rx="1"/>`;
    });
    svg+=`<text x="${gx+groupW/2}" y="${PT+h+12}" text-anchor="middle" fill="#475569" font-size="8" font-family="monospace" transform="rotate(-35,${gx+groupW/2},${PT+h+12})">${g.name||""}</text>`;
  });
  return svg+`</svg>`;
}

function recomputeBalances(sh,fromYear){
  // Recalculate Ending Balance forward from fromYear using stored fields
  const d=cd[sh];if(!d)return;
  const yrs=Object.keys(d).map(Number).sort((a,b)=>a-b);
  const startIdx=yrs.indexOf(fromYear);
  if(startIdx<0)return;
  // Get opening balance (ending balance of prior year, or back-solve from first year)
  let openBal=0;
  if(startIdx>0){
    openBal=d[yrs[startIdx-1]]["Ending Balance"]||0;
  } else {
    // For very first year, back-solve from interest: opening = interest / ROR
    const ror=d[fromYear]["Return %"]||0;
    openBal=ror!==0?(d[fromYear]["Interest Earned"]||0)/ror:0;
  }
  for(let i=startIdx;i<yrs.length;i++){
    const y=yrs[i];
    const row=d[y];
    const ror=row["Return %"]||0;
    const interest=openBal*ror;
    row["Interest Earned"]=Math.round(interest*100)/100;
    const endBal=openBal+interest+(row["Personal Contributions"]||0)+(row["Comp Match"]||0)+(row["Withdrawals"]||0)+(row["Fees"]||0);
    row["Ending Balance"]=Math.max(0,Math.round(endBal*100)/100);
    openBal=row["Ending Balance"];
  }

function attachEvents(){
  document.querySelectorAll(".editable").forEach(el=>{
    el.addEventListener("focus",()=>{
      const sh=el.dataset.sheet,y=+el.dataset.yr,field=el.dataset.field,ft=el.dataset.fmt;
      const d=cd[sh]?.[y];if(!d)return;
      const val=d[field]||0;
      el.textContent=ft==="pct"?(val*100).toFixed(2):String(Math.round(Math.abs(val)));
      setTimeout(()=>{const r=document.createRange(),s=window.getSelection();r.selectNodeContents(el);s.removeAllRanges();s.addRange(r);},10);
    });
    el.addEventListener("blur",()=>{
      const sh=el.dataset.sheet,y=+el.dataset.yr,field=el.dataset.field,ft=el.dataset.fmt;
      const n=parseFloat(el.textContent.replace(/[^0-9.\-]/g,""));
      if(isNaN(n))return render();
      const val=ft==="pct"?n/100:ft==="neg"?-Math.abs(n):n;
      if(!cd[sh])cd[sh]={};if(!cd[sh][y])cd[sh][y]={};
      cd[sh][y][field]=val;
      recomputeBalances(sh,y);
      persist();render();
    });
    el.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();el.blur();}if(e.key==="Escape")render();});
  });
}

window.resetData=()=>{if(confirm("Reset all edits to original Excel data?")){cd=JSON.parse(JSON.stringify(IC));persist();render();}};

</script>
